version: 1
source_repo: https://github.com/alexradunet/piBloom
services:
  fluffychat:
    version: "0.1.0"
    category: messaging
    image: localhost/bloom-fluffychat:latest
    optional: true
    home_visible: true
    port: 8081
    title: Bloom Web Chat
    description: FluffyChat web client preconfigured for this Bloom node
    icon_text: MX
    access_path: /
    preflight:
      commands: [podman, systemctl]
  dufs:
    version: "0.1.0"
    category: sync
    image: docker.io/sigoden/dufs:v0.38.0@sha256:5158803010c90441b576004901f8aa7ae8288ac0990f08c7650de0deb2e0651e
    optional: false
    home_visible: true
    port: 5000
    title: Bloom Files
    description: WebDAV share for the intentional cross-device Bloom folder
    icon_text: FS
    path_hint: ~/Public/Bloom
    access_path: /
    preflight:
      commands: [podman, systemctl]
  code-server:
    version: "0.1.0"
    category: development
    image: localhost/bloom-code-server:latest
    optional: true
    home_visible: true
    port: 8443
    title: Code Server
    description: Browser-based code editor running on the Bloom node
    icon_text: VS
    path_hint: /home/coder/project
    access_path: /
    preflight:
      commands: [podman, systemctl]

bridges:
  whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:v26.02@sha256:07fca07f8746c09e6d5f486d002e638da014d0a134e053e2ed7af9875053104d
    auth_method: qr_code
    health_port: 29318
    description: Bridge WhatsApp conversations to Matrix
  telegram:
    image: dock.mau.dev/mautrix/telegram:v0.15.3@sha256:04066316717e224d26677550089740f65345d64ea4a78187f5d4e0e66d970f61
    auth_method: phone_code
    health_port: 29300
    description: Bridge Telegram conversations to Matrix
  signal:
    image: dock.mau.dev/mautrix/signal:v26.02.2@sha256:577e37ad5f41bfd72a236e6ab4a1b1b2d4f960890ff0767ed3b0b7cbb6817c29
    auth_method: qr_code
    health_port: 29328
    description: Bridge Signal conversations to Matrix
