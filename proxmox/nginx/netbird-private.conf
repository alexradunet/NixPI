# NetBird-only private virtual hosts. Do not listen on public addresses.

server {
    listen 100.124.39.100:80 default_server;
    server_name _;
    return 404;
}

server {
    listen 100.124.39.100:80;
    server_name git.nazar.studio;

    client_max_body_size 0;

    location / {
        proxy_pass http://10.10.10.21:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Browser-facing HTTPS for the private dashboard and Proxmox UI.
server {
    listen 100.124.39.100:80;
    server_name nazar.studio pve.nazar.studio;
    return 301 https://$host$request_uri;
}

server {
    listen 100.124.39.100:443 ssl;
    server_name nazar.studio;

    ssl_certificate /etc/ssl/certs/pve.nazar.studio.crt;
    ssl_certificate_key /etc/ssl/private/pve.nazar.studio.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/nazar-dashboard;
    index index.html;

    location = /zellij {
        return 301 /zellij/;
    }

    # Zellij is configured with web_client { base_url "/zellij/" } and runs on
    # localhost only. Keep websocket upgrades and long-lived sessions intact.
    location /zellij/ {
        rewrite ^/zellij/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        try_files $uri $uri/ /index.html;
    }
}

# Proxmox sets secure auth cookies. Browser login therefore needs HTTPS on the
# client-facing side; plain HTTP causes "401: No ticket" after login.
server {
    listen 100.124.39.100:443 ssl;
    server_name pve.nazar.studio;

    ssl_certificate /etc/ssl/certs/pve.nazar.studio.crt;
    ssl_certificate_key /etc/ssl/private/pve.nazar.studio.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 0;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass https://127.0.0.1:8006;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
