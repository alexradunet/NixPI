# Public Minecraft landing page and NetBird-private fallback.
# Gameplay forwarding remains in minecraft-public-forward.service; this vhost only
# proxies HTTP for the static guide served by VM 110 nginx.

server {
    listen 167.235.12.22:80;
    listen 100.124.39.100:80;
    server_name mc.nazar.studio;

    location / {
        proxy_pass http://10.10.10.30:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}
