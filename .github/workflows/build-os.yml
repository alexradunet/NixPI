name: Build Bloom OS

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * SUN'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Biome check
        run: npm run check

      - name: Run CI test suite
        run: npm run test:ci

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-os-coverage
          path: coverage/
          if-no-files-found: warn

      - name: Evaluate NixOS config
        run: nix eval .#nixosConfigurations.bloom-x86_64.config.system.stateVersion

      - name: Build bloom-app derivation
        run: nix build .#bloom-app
